<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost &amp; Found Kampus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><i data-lucide="box" class="nav-icon"></i> Lost &amp; Found</a>
    <div class="navbar-right">
      <div class="nav-notif-container" id="nav-notif-container" style="display:none;">
        <button class="nav-bell-btn" onclick="toggleNotifDropdown()" title="Notifikasi">
          <i data-lucide="bell"></i>
          <span class="notif-badge" id="notif-badge" style="display:none;">0</span>
        </button>
        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-header">Notifikasi</div>
          <div class="notif-list" id="notif-list">
            <div class="notif-empty">Memuat...</div>
          </div>
        </div>
      </div>
      <span class="nav-user" id="nav-user"></span>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Ganti tema"><i data-lucide="moon" id="theme-icon"></i></button>
      <a href="create.html" class="btn btn-primary" id="nav-create" style="display:none"><i data-lucide="plus"></i> Laporan Baru</a>
      <button class="btn btn-secondary" id="nav-logout" onclick="logout()" style="display:none">Keluar</button>
      <a href="login.html" class="btn btn-primary" id="nav-login" style="display:none">Masuk</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Laporan Barang</h1>
      <p class="page-subtitle">Temukan atau laporkan barang hilang dan ditemukan di lingkungan kampus</p>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="search"
        class="search-input"
        placeholder="Cari nama barang, kategori, atau lokasi..."
      >
      <select id="filter-status" class="filter-select">
        <option value="">Semua Status</option>
        <option value="Hilang">Hilang</option>
        <option value="Ditemukan">Ditemukan</option>
        <option value="Sudah Dikembalikan">Sudah Dikembalikan</option>
      </select>
    </div>

    <div class="loading" id="loading">Memuat data...</div>

    <div class="items-grid" id="items-grid"></div>

    <div class="empty-state" id="empty-state">
      <i data-lucide="inbox" class="empty-icon-lucide"></i>
      <h3>Belum ada laporan</h3>
      <p>Jadilah yang pertama melaporkan barang hilang atau ditemukan.</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>

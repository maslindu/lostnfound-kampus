<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Barang - Lost &amp; Found Kampus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><i data-lucide="box" class="nav-icon"></i> Lost &amp; Found</a>
    <div class="navbar-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Ganti tema"><i data-lucide="moon" id="theme-icon"></i></button>
      <a href="index.html" class="btn btn-secondary"><i data-lucide="arrow-left"></i> Kembali</a>
      <button class="btn btn-secondary" id="nav-logout" onclick="logout()" style="display:none">Keluar</button>
    </div>
  </nav>

  <div class="container">
    <div id="detail-content" class="detail-card">
      <div class="loading" style="display:block; padding:48px; text-align:center; color:var(--text-muted);">
        Memuat data...
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/detail.js"></script>
  <script>lucide.createIcons();</script>

</html>
